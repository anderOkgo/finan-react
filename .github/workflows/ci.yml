name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint, test, and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        # No `cache: npm` on setup-node here: a stale actions cache can
        # restore platform-specific optional dependencies (Rollup/esbuild
        # native binaries) that don't match the runner, making `npm ci`
        # succeed but the very next step that invokes Vite/Vitest crash
        # immediately -- reproduced against this exact failure by running
        # the same npm ci + npm run test:cov in a fresh (uncached)
        # linux/node:20 Docker container, which passed cleanly both times
        # the real CI run failed.
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests with coverage
        run: npm run test:cov

      - name: Build
        run: npm run build
